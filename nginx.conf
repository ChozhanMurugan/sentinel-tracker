worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # --- Static frontend files ---
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Docker internal DNS — resolves upstreams lazily so nginx starts
        # even when 'backend' is not yet running.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream http://backend:8000;

        # --- Proxy REST API to backend ---
        location /api/ {
            proxy_pass         $backend_upstream/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # --- Proxy health endpoint ---
        location /health {
            proxy_pass         $backend_upstream/health;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # --- Proxy WebSocket ---
        location /ws {
            proxy_pass             $backend_upstream/ws;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host $host;
            proxy_read_timeout     3600s;
            proxy_send_timeout     3600s;
        }

        # --- Proxy ML REST API ---
        location /ml/ {
            proxy_pass         http://sentinel-ml:8001/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # --- Proxy ML WebSocket ---
        location /ml-ws {
            proxy_pass             http://sentinel-ml:8001/ws;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host $host;
            proxy_read_timeout     3600s;
            proxy_send_timeout     3600s;
        }
    }
}
